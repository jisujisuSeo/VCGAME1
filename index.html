<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteor Escape Ultimate</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="startScreen" class="overlay">
    <h1>🚀 Meteor Escape Ultimate</h1>

    <p>
        좌우로 이동하며 운석을 피하세요!<br>
        목숨은 3개입니다.
    </p>

    <div class="controls">
        ← → 또는 A D
    </div>

    <button id="startBtn">
        GAME START
    </button>
</div>



<div id="hud">

    <div id="score">
        SCORE : 0
    </div>

    <div id="best">
        BEST : 0
    </div>

    <div id="lives">

        ❤️ ❤️ ❤️

    </div>

</div>



<canvas id="gameCanvas"
width="480"
height="720"></canvas>




<div id="gameOver" class="overlay hidden">

    <h1>GAME OVER</h1>

    <p id="finalScore">

    </p>

    <button id="restartBtn">

        PLAY AGAIN

    </button>

</div>





<div id="mobileControls">

    <button id="leftBtn">

        ◀

    </button>


    <button id="rightBtn">

        ▶

    </button>

</div>

<script src="script.js"></script>

</body>
</html>
