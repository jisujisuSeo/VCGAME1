<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meteor Escape 3.0</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 시작 화면 -->
<div id="startScreen">
  <div class="panel">
    <h1>🚀 Meteor Escape</h1>

    <p class="desc">
      우주선을 조종하여 떨어지는 운석을 피하세요!
    </p>

    <ul class="guide">
      <li>❤️ 목숨은 총 3개입니다.</li>
      <li>☄️ 운석을 피할 때마다 점수가 +1 증가합니다.</li>
      <li>⌨️ 방향키 ← → 로 이동합니다.</li>
      <li>🏆 최고 점수에 도전해보세요!</li>
    </ul>

    <button id="startBtn">
      게임 시작
    </button>
  </div>
</div>


<!-- 게임 UI -->
<div id="hud">

  <div id="lives">
    ❤️❤️❤️
  </div>

  <div>
    SCORE :
    <span id="score">0</span>
  </div>

  <div>
    BEST :
    <span id="best">0</span>
  </div>

</div>


<canvas
id="gameCanvas"
width="500"
height="700">
</canvas>



<!-- 게임오버 -->

<div id="gameOver" class="hidden">

  <div class="panel">

    <h1>💥 GAME OVER</h1>

    <p>
      SCORE :
      <span id="finalScore">0</span>
    </p>

    <p>
      BEST :
      <span id="finalBest">0</span>
    </p>

    <button id="restartBtn">

      PLAY AGAIN

    </button>

  </div>

</div>


<script src="script.js"></script>

</body>
</html>
